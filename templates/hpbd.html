    <script type="text/javascript">
        anime({
            targets: '.birthday-cake svg path',
            strokeDashoffset: [anime.setDashoffset, 0],
            easing: 'easeInOutSine',
            duration: 9000,
            delay: function (el, i) {return i * 300;},
            direction: 'forwards' 
        });
    </script>
    <script type="text/javascript">
        particlesContainer = document.getElementById("particles-js");
        setTimeout(particlesContainer.classList.add("show"), 5000);

        particlesJS("particles-js", {
           particles: {
              number: { value: 50, density: { enable: true, value_area: 800 } },
              // color: { value: ["#f7b267", "#f79d65", "#f4845f", "#f27059", "#f25c54", "#ffffff", "#cc444b", "#ff6b6b","#e63946" ] },
              color: { value: ["#fde4f2", "#f9cee7", "#f4b8da", "#eea1cd", "#e68bbe"] },
              shape: {
                 type: "circle",
                 stroke: { width: 0, color: "#000000" },
                 polygon: { nb_sides: 5 },
                 image: { src: "img/github.svg", width: 100, height: 100 }
              },
              opacity: {
                 value: 0.7,
                 random: false,
                 anim: { enable: false, speed: 1, opacity_min: 0.1, sync: false }
              },
              size: {
                 value: 10,
                 random: true,
                 anim: { enable: false, speed: 40, size_min: 0.1, sync: false }
              },
              line_linked: {
                 enable: false,
                 distance: 150,
                 color: "#ffffff",
                 opacity: 0.7,
                 width: 1
              },
              move: {
                 enable: true,
                 speed: 5,
                 direction: "top",
                 random: true,
                 straight: false,
                 out_mode: "snow",
                 bounce: false,
                 attract: { enable: false, rotateX: 600, rotateY: 1200 }
              }
           },
           interactivity: {
              detect_on: "canvas",
              events: {
                 onhover: { enable: true, mode: "repulse" },
                 onclick: { enable: true, mode: "push" },
                 resize: true
              },
              modes: {
                 grab: { distance: 400, line_linked: { opacity: 0.6 } },
                 bubble: { distance: 200, size: 60, duration: 2, opacity: 8, speed: 3 },
                 repulse: { distance: 100, duration: 0.4 },
                 push: { particles_nb: 25 },
                 remove: { particles_nb: 2 }
              }
           },
           retina_detect: true
        });
    </script>
